databases:
  - name: cloth-db
    databaseName: clothdb
    user: cloth
    plan: free

services:
  - type: web
    name: cloth-counter-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cloth-db
          property: connectionString
      - key: NODE_ENV
        value: production